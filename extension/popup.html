<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        width: 380px;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        padding: 20px;
        background: #14120b;
        color: #edecec;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      h1 {
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .open-app {
        font-size: 12px;
        color: rgba(237, 236, 236, 0.35);
        text-decoration: none;
        transition: color 0.15s;
      }
      .open-app:hover { color: rgba(237, 236, 236, 0.55); }

      .subtitle {
        font-size: 13px;
        color: rgba(237, 236, 236, 0.55);
        margin-bottom: 16px;
      }

      textarea {
        width: 100%;
        padding: 12px 14px;
        background: rgba(237, 236, 236, 0.04);
        border: 1px solid rgba(237, 236, 236, 0.08);
        border-radius: 8px;
        font-family: inherit;
        font-size: 14px;
        color: #edecec;
        outline: none;
        resize: none;
        min-height: 42px;
        transition: border-color 0.15s;
      }
      textarea::placeholder { color: rgba(237, 236, 236, 0.35); }
      textarea:focus { border-color: rgba(237, 236, 236, 0.2); }

      button {
        width: 100%;
        margin-top: 10px;
        padding: 10px;
        background: #edecec;
        color: #14120b;
        border: none;
        border-radius: 8px;
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover { background: rgba(237, 236, 236, 0.85); }
      button:disabled { opacity: 0.3; cursor: not-allowed; }

      #status {
        margin-top: 12px;
        font-size: 13px;
        color: rgba(237, 236, 236, 0.55);
        line-height: 1.4;
      }
      #status.error { color: rgba(248, 113, 113, 0.8); }
      #status.success { color: rgba(74, 222, 128, 0.8); }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>NL2Cal</h1>
      <a class="open-app" href="https://nltocal.vercel.app" target="_blank">Open full app</a>
    </div>
    <p class="subtitle">Create, delete, or RSVP — just type naturally.</p>
    <textarea
      id="input"
      rows="1"
      placeholder='"2 hour lunch with Sarah Friday at noon"'
      autofocus
    ></textarea>
    <button id="submit">Go</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
